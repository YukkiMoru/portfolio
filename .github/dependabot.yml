version: 2
updates:
  # 1. GitHub Actions（自動デプロイ機能）の定期アップデート
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly" # 毎週チェックする
    labels:
      - "dependencies"

  # 2. Pythonパッケージ（MkDocsやプラグイン）の定期アップデート
  # uvプロジェクトとして pyproject.toml / uv.lock を検知するように設定
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly" # 毎週チェックする
    labels:
      - "dependencies"